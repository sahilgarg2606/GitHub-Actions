name: Multi Job 

on: 
    workflow_dispatch:
        inputs:
            environment: 
                description: "Multi Stage YML"
                required: true
                default: "dev"
                type: choice
                options:
                    - master
                    - dev
                    - Prod

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Build
              run: echo "Building the App"
    test:
        runs-on: ubuntu-latest
        needs: 
            - build
        steps:
            - name: testing 
              run: echo "Running tests"
    deploy:
        runs-on: ubuntu-latest
        needs: 
            - build
            - test
        steps:
            - name: Deploy
              run: echo "Deploying"


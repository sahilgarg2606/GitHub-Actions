name: secrets 

on:
    push:
        branches: 
            - master

jobs:
    secret-printer:
        runs-on: ubuntu-latest
        steps:
            - name: secret printer
              run: echo "${{secrets.MY_SECRET_MESSAGE}}"
              env:
                my_messagg: ${{secrets.MY_SECRET_MESSAGE}} 
            - name: print true if setted
              run: echo "secret is set ${my_messagg}"
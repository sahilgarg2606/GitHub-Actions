name: OS informations
on: 
    push:
        branches:
            - master
jobs:
  osInfo:
      strategy:
         fail-fast: false
         matrix:
            os: ["ubuntu-latest" ,"windows-latest","macos-latest"]
      runs-on: ${{ matrix.os }}
      steps:
        - name: name of OS
          run: echo "${{matrix.os}}"
            
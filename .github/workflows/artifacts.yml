name: artifacts

on: 
    push:
        branches:
            - master

jobs:
    artifactss:
        runs-on: ubuntu-latest
        steps:
            - name: generate report
              run: |
                 echo "hello world" >> file.txt
                 echo "kyaa baat hai" >> file.txt
            - name: upload artifacts
              uses: actions/upload-artifact@v4
              with:
                name: my-artifact
                path: file.txt
    download-artifacts:
        runs-on: ubuntu-latest
        needs: [artifactss]
        steps:
            - name: download report
              uses: actions/download-artifact@v4
              with:
                name: my-artifact
                path: file.txt
            - run: ls -l